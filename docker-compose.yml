version: "3.8"

services:
  ncaclmanager:
    build: .
    container_name: ncaclmanager-exapp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ncaclmanager_data:/data
    environment:
      # Заполняется AppAPI при деплое через deploy.json,
      # но для локальной разработки можно задать вручную
      APP_ID:        ncaclmanager
      APP_SECRET:    ${APP_SECRET:-}
      APP_VERSION:   "1.0.0"
      NEXTCLOUD_URL: ${NEXTCLOUD_URL:-http://nextcloud:80}
      APP_HOST:      0.0.0.0
      APP_PORT:      8080
      DB_PATH:       /data/ncaclmanager.db
    networks:
      - nextcloud_network

networks:
  nextcloud_network:
    external: true
    name: ${NC_NETWORK:-nextcloud_default}

volumes:
  ncaclmanager_data:
